<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Master</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:linear-gradient(
        -45deg,
        #667eea,
        #764ba2,
        #6a11cb,
        #2575fc
    );

    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.container{

    width:90%;
    max-width:700px;

    padding:50px;

    text-align:center;

    backdrop-filter:blur(15px);

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.3);

    border-radius:25px;

    box-shadow:
    0 8px 32px rgba(0,0,0,.25);

    color:white;

    z-index:1;
}

.logo{
    font-size:4rem;
    margin-bottom:15px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:30px;
}

.features{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:35px;
}

.feature{
    background:rgba(255,255,255,.15);
    padding:12px 20px;
    border-radius:12px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{

    text-decoration:none;

    padding:15px 35px;

    border-radius:12px;

    font-weight:600;

    transition:.3s;
}

.login{
    background:white;
    color:#333;
}

.signup{
    background:#00e676;
    color:black;
}

.btn:hover{

    transform:translateY(-5px);

    box-shadow:
    0 10px 25px rgba(0,0,0,.3);
}

.footer{
    margin-top:35px;
    opacity:.8;
    font-size:.9rem;
}

@media(max-width:768px){

    h1{
        font-size:2rem;
    }

    .container{
        padding:30px;
    }
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="logo">📝</div>

    <h1>Todo Master</h1>

    <p>
        Organize your daily tasks, track your progress,
        and stay productive with a secure cloud-based
        Todo Manager powered by MongoDB.
    </p>

    <div class="features">

        <div class="feature">✅ Task Management</div>

        <div class="feature">🔐 Secure Login</div>

        <div class="feature">☁ MongoDB Storage</div>

        <div class="feature">📱 Responsive</div>

    </div>

    <div class="buttons">

        <a href="login.html" class="btn login">
            Login
        </a>

        <a href="signup.html" class="btn signup">
            Sign Up
        </a>

    </div>

    <div class="footer">
        Built with HTML, CSS, JavaScript, Node.js & MongoDB
    </div>

</div>

</body>
</html>
